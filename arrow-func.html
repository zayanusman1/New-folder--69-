<!DOCTYPE html>
<html lang="en">
    <body>
        <h2>Arrow Functions in JavaScript</h2>
        <p>This is an example of an arrow function in JavaScript.</p>
        <script>
            const add = (a, b) => a + b;
            document.write("The result of adding 5 and 3 is: " + add(5, 3));
        </script>
    </body>
</html>
