<!DOCTYPE html>
<html lang="en">
    <body>
        <h2>JavaScript Error Handling</h2>
        <p>This is a simple example of error handling in JavaScript.  </p>
        <p id="error_msg"></p>
        <script>
            try {
                addalert("Welcome to JavaScript Error Handling");
            }
            catch (err) {
                document.getElementById("error_msg").innerHTML = err.message;
            }
        </script>
    </body>
</html>
